<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 어린이 속담 유래 사전</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #fff9e6;
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            color: #ff9f43;
            margin-bottom: 10px;
            font-size: 32px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            padding: 15px;
            width: 70%;
            border: 3px solid #feca57;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #ff9f43;
        }
        button {
            padding: 15px 25px;
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ee5253;
        }
        #result-area {
            display: none;
            text-align: left;
            background-color: #f1f2f6;
            padding: 30px;
            border-radius: 15px;
            border-left: 6px solid #1dd1a1;
            margin-top: 20px;
        }
        .proverb-title {
            font-size: 28px;
            font-weight: bold;
            color: #222f3e;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px dashed #c8d6e5;
            padding-bottom: 15px;
        }
        .info-label {
            display: inline-block;
            background-color: #1dd1a1;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 12px;
        }
        .proverb-text {
            font-size: 18px;
            line-height: 1.7;
            color: #341f97;
            margin: 0;
            padding: 10px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📜 속담 속에 숨겨진 옛날이야기</h1>
        <p class="subtitle">학습지에 있는 속담을 검색하면 재미있는 유래를 알려드려요!</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="예: 가는 말이 고와야" onkeypress="handleKeyPress(event)">
            <button onclick="searchProverb()">이야기 찾기</button>
        </div>

        <div id="result-area">
            <h2 class="proverb-title" id="resultTitle"></h2>
            
            <div id="resultContent">
                <span class="info-label">📖 왜 이런 말이 생겼을까?</span>
                <p class="proverb-text" id="resultOrigin"></p>
            </div>
            
            <div id="errorContent" style="display:none;">
                <p class="proverb-text" id="errorMsg" style="color:#ee5253; font-weight:bold;"></p>
            </div>
        </div>
    </div>

    <script>
        // 100개의 속담과 아이들 맞춤형 유래 이야기 데이터베이스입니다.
        const proverbDB = [
            { name: "가는 말이 고와야 오는 말이 곱다", origin: "내가 먼저 메아리처럼 다정한 말을 던져야 상대방도 다정한 말로 대답해 준다는 뜻에서 만들어진 말이에요. 옛날 어른들이 서로 예의를 지키자고 만든 약속 같은 속담이랍니다." },
            { name: "가랑비에 옷 젖는 줄 모른다", origin: "가랑비는 빗방울이 아주 작아서 맞아도 당장은 안 젖는 것 같아요. 하지만 계속 맞다 보면 어느새 옷이 흠뻑 젖어버리죠. 아무리 작은 일이나 장난도 계속 쌓이면 큰일이 된다는 걸 자연 현상에 빗대어 만든 말이에요." },
            { name: "가지 많은 나무에 바람 잘 날 없다", origin: "나뭇가지가 많으면 바람이 조금만 불어도 잎사귀들이 사방에서 흔들리며 시끄럽겠죠? 옛날 어른들이 자식이 많거나 일이 많으면 매일매일 크고 작은 걱정거리가 생긴다며 나무에 빗대어 만든 말이에요." },
            { name: "간에 붙었다 쓸개에 붙었다 한다", origin: "우리 몸속의 '간'과 '쓸개'는 아주 가까이 붙어 있어요. 줏대 없이 자기에게 이익이 되는 쪽으로 여기저기 편을 바꾸는 사람의 모습을, 마치 간에 붙었다가 쓸개로 훌쩍 옮겨 붙는 얌체 같은 모습으로 재미있게 표현한 거예요." },
            { name: "강 건너 불구경하듯 한다", origin: "저 멀리 강 건너편에 불이 나면, 나에게 불꽃이 튈 위험이 없으니 그냥 팔짱을 끼고 멍하니 구경만 하게 되죠? 다른 사람의 큰 위기나 어려움을 자기와 상관없다며 모른 척할 때 쓰는 말이에요." },
            { name: "겉 다르고 속 다르다", origin: "수박은 겉은 초록색이지만 속은 새빨갛죠? 사람도 겉으로는 빵긋빵긋 웃으면서 속으로는 나쁜 마음이나 다른 생각을 가질 수 있어요. 그런 사람의 마음을 과일이나 물건에 빗대어 만든 말이에요." },
            { name: "계란으로 바위치기", origin: "크고 단단한 바위에 얇고 약한 계란을 던지면 어떻게 될까요? 바위는 끄떡없고 계란만 산산조각이 나겠죠. 옛날 사람들이 도저히 이길 수 없는 강한 상대와 무모하게 싸울 때 이 모습을 떠올렸대요." },
            { name: "고생 끝에 낙이 온다", origin: "농부들이 봄여름 내내 땀 흘려 힘들게 밭을 일구면, 가을에 꿀맛 같은 열매를 맺는 기쁨(낙)을 얻는 데서 나온 말이에요. 꾹 참고 힘든 일을 견디면 반드시 좋은 날이 온다는 응원의 속담이랍니다." },
            { name: "고래 싸움에 새우 등 터진다", origin: "덩치 큰 고래들이 바다에서 쿵쿵 부딪치며 싸우면, 옆을 지나가던 조그만 새우는 영문도 모른 채 물살에 휩쓸려 다치고 말겠죠? 힘센 사람들끼리 싸우는 바람에 아무 상관 없는 약한 사람이 억울하게 피해를 볼 때 써요." },
            { name: "고양이 목에 방울 달기", origin: "옛날 쥐들이 모여 '고양이 목에 딸랑딸랑 방울을 달면 우리가 도망칠 수 있겠다!'라고 기발한 아이디어를 냈지만, 정작 무서운 고양이에게 다가갈 쥐는 아무도 없었다는 유명한 우화에서 유래했어요." },
            { name: "공든 탑이 무너지랴", origin: "돌을 하나하나 정성껏 쌓아 올려 튼튼하게 만든 탑(공든 탑)은 웬만한 비바람이나 지진에도 쉽게 무너지지 않아요. 정성을 다해 열심히 노력한 일은 절대 헛되지 않고 좋은 결과를 낸다는 뜻이에요." },
            { name: "구슬이 서 말이라도 꿰어야 보배", origin: "'서 말'은 아주 많은 양을 뜻해요. 영롱하고 예쁜 구슬이 아무리 많아도 실로 예쁘게 꿰어야만 목걸이나 팔찌 같은 보석(보배)이 된다는 뜻이에요. 아무리 좋은 재능이나 아이디어도 직접 실천해야 쓸모가 있답니다." },
            { name: "굴러온 돌이 박힌 돌 뺀다", origin: "땅에 단단하게 원래부터 박혀 있던 돌이 있었는데, 어디선가 굴러온 새로운 돌이 쾅 부딪혀서 원래 있던 돌을 튕겨내 버린 상황이에요. 나중에 새로 온 사람이 원래 있던 사람을 쫓아낼 때 쓰는 말이랍니다." },
            { name: "그림의 떡", origin: "종이에 아주 맛있어 보이는 떡이 그려져 있어요. 보기에는 군침이 돌지만, 종이에 그려진 거라 절대 먹을 수는 없죠? 아무리 마음에 들어도 실제로 가질 수 없거나 이루어질 수 없는 것을 말할 때 써요." },
            { name: "금강산도 식후경", origin: "우리나라에서 제일 경치가 아름답다는 금강산! 하지만 배가 꼬르륵 고프면 그 멋진 경치도 눈에 안 들어온대요. 밥을 먹은 뒤(식후)에 구경(경)을 해야 즐겁다는 뜻으로, 밥 먹는 게 가장 중요하다는 옛날 어른들의 지혜예요." },
            { name: "뛰는 놈 위에 나는 놈 있다", origin: "달리기를 아주 잘하는(뛰는) 사람이 '내가 최고야!' 하고 뽐내고 있는데, 그 위로 하늘을 휙 날아가는(나는) 사람이 있다는 뜻이에요. 아무리 재주가 뛰어나도 그보다 더 뛰어난 사람이 항상 있으니 자만하지 말라는 교훈이에요." },
            { name: "길고 짧은 것은 대봐야 안다", origin: "눈으로 볼 때는 어느 막대기가 더 긴지 헷갈리지만, 두 개를 딱 붙여서 대보면 금방 알 수 있죠? 사람의 능력이나 시합의 결과도 겉보기만으로 판단하지 말고, 실제로 겨루어 봐야 정확히 알 수 있다는 뜻이에요." },
            { name: "까마귀 날자 배 떨어진다", origin: "나무에 까마귀가 앉아 있다가 휙 날아갔는데, 우연히 그 순간 배가 툭 하고 떨어졌어요. 배밭 주인은 '까마귀가 내 배를 쪼아 떨어뜨렸구나!' 하고 오해하겠죠? 아무 상관 없는 일이 우연히 겹쳐 오해를 받을 때 쓰는 말이에요." },
            { name: "꿩 대신 닭", origin: "옛날에는 만둣국을 끓일 때 아주 맛있는 '꿩' 고기를 썼대요. 하지만 꿩은 잡기 어려워서 구하기 힘들 때는 흔한 '닭'을 대신 넣고 끓였다고 해요. 자기가 정말 원하는 게 없을 때 비슷한 것으로 대신 쓴다는 유래랍니다." },
            { name: "남의 떡이 더 커 보인다", origin: "내 손에 있는 떡과 친구 손에 있는 떡의 크기가 똑같은데도, 왠지 친구 것이 더 커 보이고 맛있어 보이는 사람의 심리를 표현한 거예요. 자기가 가진 것에 만족하지 못하고 남의 것을 부러워할 때 쓰는 말이에요." },
            { name: "낫 놓고 기역 자도 모른다", origin: "옛날 농부들이 풀을 벨 때 쓰던 도구인 '낫'은 한글 '기역(ㄱ)'과 모양이 똑같이 생겼어요. 눈앞에 기역 모양의 낫을 두고도 기역 자를 모른다고 하니, 아주 쉬운 글자나 기초적인 상식도 모르는 사람을 놀릴 때 썼대요." },
            { name: "내 코가 석 자", origin: "'석 자'는 약 90cm 정도 되는 긴 길이를 뜻해요. 콧물이 90cm나 길게 주르륵 흘러내리고 있다면 남을 도와줄 정신이 있을까요? 당장 내 콧물 닦기도 바쁘겠죠. 내 사정이 너무 급해서 남을 도와줄 여유가 전혀 없다는 뜻이에요." },
            { name: "누워서 떡 먹기", origin: "방바닥에 편안하게 누워서 맛있는 떡을 먹는 건 힘이 하나도 안 드는 아주 편한 일이죠? (물론 진짜 누워서 먹으면 체할 수 있어요!) 그만큼 식은 죽 먹기보다 더 쉽고 아주 간단하게 할 수 있는 일을 뜻하는 말이에요." },
            { name: "누워서 침 뱉기", origin: "천장을 보고 누워서 허공에 '퉤!' 하고 침을 뱉으면 어떻게 될까요? 그 침은 고스란히 자기 얼굴로 뚝 떨어지게 돼요. 남을 흉보거나 해코지하려고 한 행동이 결국 돌고 돌아 자기 자신에게 나쁘게 돌아온다는 깊은 뜻이에요." },
            { name: "다된 밥에 재 뿌리기", origin: "맛있는 밥이 가마솥에서 거의 다 지어져 구수한 냄새가 나는데, 누군가 장난으로 아궁이의 시커먼 '재'를 밥솥에 휙 뿌려버린 상황이에요. 거의 다 완성되어 가던 훌륭한 일을 마지막 순간에 와장창 망쳐버렸을 때 쓰는 말이랍니다." },
            { name: "달면 삼키고 쓰면 뱉는다", origin: "사탕처럼 입에 달콤한 것은 꿀꺽 삼키고, 약처럼 쓴 것은 인상을 쓰며 퉤 뱉어버리는 아이의 모습에서 왔어요. 사람을 대할 때도 자기에게 이익이 될 때는 친하게 지내고, 손해가 될 것 같으면 매몰차게 돌아서는 이기적인 행동을 뜻해요." },
            { name: "닭 쫓던 개 지붕 쳐다본다", origin: "마당의 개가 닭을 잡아먹으려고 멍멍 짖으며 쫓아갔는데, 깜짝 놀란 닭이 푸드덕 날아 지붕 위로 올라가 버렸어요. 개는 지붕에 올라갈 수 없으니 헥헥대며 멍하니 지붕만 쳐다봐야 했죠. 애쓰던 일이 실패해서 허탈해하는 모습이에요." },
            { name: "당장 먹기엔 곶감이 달다", origin: "곶감은 달콤하고 맛있어서 눈앞에 있으면 당장 다 먹어버리고 싶죠. 하지만 겨울 식량으로 아껴두지 않고 지금 다 먹어치우면 나중엔 배가 고프게 될 거예요. 먼 미래를 생각하지 않고 지금 당장 좋고 편한 것만 찾는다는 유래랍니다." },
            { name: "도둑이 제 발 저린다", origin: "남의 물건을 훔친 도둑은 마음속이 찔려서 항상 '누가 날 잡으러 오면 어쩌지?' 하고 불안해해요. 그러다 보니 아무도 뭐라고 안 했는데 혼자 깜짝 놀라 다리(발)가 저릿저릿 떨리는 것처럼, 죄지은 사람이 스스로 티를 낸다는 뜻이에요." },
            { name: "돌다리도 두들겨 보고 건너라", origin: "나무다리보다 훨씬 튼튼한 돌다리라도 혹시 부서지거나 금 간 곳이 없는지 지팡이로 톡톡 두들겨 확인하고 건너라는 옛 어른들의 말씀이에요. 아무리 자신이 있고 잘 아는 일이라도 한 번 더 꼼꼼하게 확인하고 조심하라는 뜻이랍니다." },
            { name: "등잔 밑이 어둡다", origin: "옛날에는 전기가 없어서 기름을 태워 불을 밝히는 '등잔'을 썼어요. 등잔불은 방 안을 환하게 비추지만, 정작 등잔 바로 밑부분은 그림자가 져서 캄캄했대요. 먼 곳의 일은 잘 알면서 내 주변 가까이에서 일어난 일을 오히려 모를 때 써요." },
            { name: "마른하늘에 날벼락", origin: "비가 오고 먹구름이 낀 날 벼락(번개)이 치는 건 당연하지만, 구름 한 점 없이 맑게 '마른하늘'에 갑자기 쾅! 하고 벼락이 치면 얼마나 황당할까요? 전혀 예상하지 못했던 아주 끔찍하고 불행한 일이 갑자기 일어났을 때 쓰는 말이에요." },
            { name: "말 한마디에 천 냥 빚도 갚는다", origin: "조선 시대에 '천 냥'은 어마어마하게 큰돈이었어요. 평생을 갚아도 못 갚을 그 큰 빚을, 진심이 담긴 따뜻하고 예쁜 '말 한마디'로 감동시켜 탕감받았다는 이야기에서 유래했어요. 말을 예쁘게 하는 것이 얼마나 중요한지 알려주죠." },
            { name: "매도 먼저 맞는 게 낫다", origin: "옛날 서당에서 숙제를 안 해와서 훈장님께 회초리(매)를 맞아야 할 때, 친구들이 맞는 걸 덜덜 떨며 뒤에서 구경하는 것보다 그냥 눈 딱 감고 제일 먼저 맞는 게 마음이 편하다는 데서 왔어요. 피할 수 없는 힘든 일은 빨리 해치우는 게 좋다는 뜻이에요." },
            { name: "먼 사촌보다 가까운 이웃이 낫다", origin: "아무리 핏줄이 이어진 사촌이라도 멀리 살면 위급할 때 도와주기 힘들죠. 오히려 피는 안 섞였어도 앞집, 옆집에 사는 이웃사촌이 매일 인사하고 서로 돕기 때문에 더 든든하고 좋다는 뜻이에요. 이웃과 다정하게 지내라는 교훈이 담겨 있어요." },
            { name: "모르는 게 약이다", origin: "어떤 사실을 알게 되면 마음이 아프거나 계속 걱정만 하게 될 때, 차라리 그 사실을 전혀 몰랐다면 마음이 편안했을 것이라는 뜻이에요. 옛날 의원들이 '병에 대해 너무 알면 스트레스를 받으니 약을 먹듯 모르는 게 낫다'고 한 데서 유래했어요." },
            { name: "믿는 도끼에 발등 찍힌다", origin: "나무꾼이 매일 쓰던 튼튼한 도끼를 굳게 믿고 힘껏 나무를 내리쳤는데, 도끼자루가 쑥 빠지면서 자기 발등을 쾅 찍어버린 끔찍한 상황이에요. 가장 믿고 의지하던 친구나 사람에게 배신을 당해 큰 충격을 받았을 때 이 비유를 쓴답니다." },
            { name: "밑 빠진 독에 물 붓기", origin: "항아리(독)의 밑바닥이 깨져서 구멍이 뻥 뚫려 있다면, 아무리 열심히 물을 퍼다 부어도 물이 다 새어나가서 영원히 채울 수 없겠죠? 아무리 힘들여 수고하고 노력해도 보람이 없고 다 헛수고가 되어버리는 안타까운 상황을 말해요." },
            { name: "바늘 도둑이 소도둑 된다", origin: "처음에는 아주 작고 뾰족한 '바늘' 하나를 슬쩍 훔쳤던 아이가, 나중에는 '에이, 안 들키네?' 하고 대담해져서 결국 덩치 큰 '소'까지 훔치는 큰 도둑이 된다는 이야기예요. 작은 나쁜 버릇을 제때 안 고치면 아주 무서운 범죄자가 될 수 있다는 경고랍니다." },
            { name: "배보다 배꼽이 더 크다", origin: "사람의 몸통인 '배'가 배꼽보다 훨씬 큰 게 정상이죠? 그런데 배꼽이 배보다 더 커져 버렸다면 정말 이상하고 어색할 거예요. 물건을 샀는데 물건값보다 택배비가 더 비싸게 나오는 것처럼, 부수적인 게 메인보다 더 클 때 쓰는 말이에요." },
            { name: "백지장도 맞들면 낫다", origin: "'백지장'은 종이 한 장을 말해요. 종이 한 장은 깃털처럼 가벼워서 혼자 들어도 아무렇지 않죠. 하지만 그 가벼운 종이조차도 친구와 둘이서 맞들면 찢어지지 않고 더 똑바르게 들 수 있어요. 아무리 쉬운 일이라도 서로 힘을 합치고 협동하면 훨씬 좋다는 뜻이에요." },
            { name: "벼는 익을수록 고개를 숙인다", origin: "가을 들판의 벼를 보면, 알맹이가 꽉 차지 않은 빈 껍데기는 가벼워서 꼿꼿하게 서 있지만, 알맹이가 꽉 찬 무거운 벼는 땅을 향해 겸손하게 고개를 푹 숙여요. 배운 것이 많고 훌륭한 사람일수록 잘난 척하지 않고 겸손하다는 자연의 가르침이에요." },
            { name: "병 주고 약 준다", origin: "남을 실컷 때려서 병들게 상처를 줘놓고는, 미안하다며 갑자기 친절하게 약을 발라주는 얄미운 사람의 행동에서 나온 말이에요. 일부러 해를 입혀놓고는 속도 모르고 도와주는 척하며 달래는 아주 괘씸한 상황을 뜻한답니다." },
            { name: "보기 좋은 떡이 먹기도 좋다", origin: "모양도 예쁘고 색깔도 알록달록 고운 떡은, 정성이 가득 들어갔기 때문에 맛도 훨씬 좋을 거라는 옛날 사람들의 믿음에서 왔어요. 겉모습이나 포장을 깔끔하게 잘 해놓으면, 그 안에 담긴 내용물이나 실속도 좋을 가능성이 높다는 뜻이에요." },
            { name: "불난 집에 부채질한다", origin: "집에 불이 나서 활활 타고 있는데, 물을 끼얹어 끄지는 못할망정 옆에서 부채질을 해서 바람을 불어넣으면 불이 더 무섭게 번지겠죠? 안 그래도 화가 나거나 슬픈 상황에 있는 친구를 더 약 올리고 괴롭혀서 상황을 망칠 때 쓰는 말이에요." },
            { name: "비온 뒤에 땅이 굳어진다", origin: "비가 오면 흙바닥이 질퍽질퍽해져서 걷기 힘들죠. 하지만 비가 그치고 따뜻한 햇볕이 내리쬐면 그 진흙이 바위처럼 아주 단단해져요. 친구와 크게 싸우거나 힘든 시련을 겪고 나면, 서로를 더 잘 이해하게 되어 우정이나 마음이 튼튼해진다는 뜻이에요." },
            { name: "사공이 많으면 배가 산으로 간다", origin: "배를 노 저어 가는 사람을 '사공'이라고 해요. 선장 한 명이 지시를 내려야 하는데, 사공 열 명이 서로 '오른쪽으로 가!', '왼쪽으로 가!' 하고 떠들면 배가 바다가 아니라 엉뚱한 산 위로 올라가 버린다는 코믹한 유래예요. 지시하는 사람이 너무 많으면 일을 망친다는 뜻이죠." },
            { name: "산 넘어 산", origin: "힘들게 헥헥거리며 높은 산을 하나 넘었는데, 휴 다행이다 싶어 앞을 보니 아까보다 더 높고 험한 산이 떡 하니 버티고 있는 상황이에요. 어려운 문제를 하나 겨우 해결했더니, 그 뒤에 더 어렵고 힘든 일이 계속해서 나타날 때 한숨을 쉬며 쓰는 말이에요." },
            { name: "서당개 삼 년이면 풍월을 읊는다", origin: "옛날 아이들이 모여 글을 읽던 '서당' 마당에서 키우던 멍멍이 이야기예요. 개가 3년 동안 매일 아이들의 글 읽는 소리를 듣다 보니, 자기도 모르게 한문(풍월)을 읊는 흉내를 낸다는 뜻이죠. 아무것도 모르던 사람도 한 분야에 오래 있으면 저절로 전문가가 된다는 뜻이에요." },
            { name: "세 살 버릇 여든까지 간다", origin: "말을 겨우 배운 세 살 꼬마 때 무심코 들인 나쁜 습관이나 버릇은, 머리가 하얗게 센 여든 살 할아버지가 될 때까지 절대 고쳐지지 않는다는 무서운 뜻이에요. 어릴 때부터 바르고 좋은 습관을 들이는 것이 평생을 좌우한다는 조상님들의 가르침이랍니다." },
            { name: "소 잃고 외양간 고친다", origin: "밤새 도둑이 들어서 비싼 소를 훔쳐 가버렸어요. 그제야 농부가 엉엉 울면서 소가 살던 집(외양간)의 부서진 울타리를 망치로 뚝딱뚝딱 고친다는 이야기예요. 이미 큰 피해를 보고 일이 잘못되어 버린 뒤에 뒤늦게 대비해 봐야 아무 소용없다는 뜻이죠." },
            { name: "쇠뿔도 단김에 빼라", origin: "대장간에서 딱딱한 소의 뿔을 뽑거나 자르려면, 뿔을 불에 달궈 뜨거운 김이 펄펄 날 때 한 번에 쑥 뽑아야 쉽대요. 식어버리면 너무 단단해서 뺄 수가 없거든요. 어떤 일을 하려고 마음먹었다면 미루지 말고 열정이 뜨거울 때 지금 당장 시작하라는 뜻이에요." },
            { name: "식은 죽 먹기", origin: "펄펄 끓는 뜨거운 죽은 입천장을 델까 봐 호호 불며 조심해서 먹어야 하지만, 다 식어버린 죽은 씹을 필요도 없이 후루룩 마셔버릴 수 있죠. '누워서 떡 먹기'와 똑같이 아주아주 쉽고 간단하게 해낼 수 있는 일을 뜻하는 말이랍니다." },
            { name: "십년 공부 도로 아미타불", origin: "스님이 깊은 산속에서 10년 동안 열심히 불경(아미타불)을 외우며 도를 닦았는데, 한순간의 실수로 그 노력이 모두 물거품이 되어 처음으로 다시 돌아가 버렸다는 옛이야기에서 유래했어요. 오랫동안 공들여 한 일이 완전히 헛수고가 되어버렸을 때 써요." },
            { name: "아는 길도 물어 가라", origin: "매일매일 다니던 익숙한 골목길이라도 혹시 공사를 하거나 개가 나타났을 수 있으니, 지나가는 사람에게 한 번 더 물어보고 조심해서 가라는 옛날 사람들의 지혜예요. '돌다리도 두들겨 보고 건너라'와 같이 아무리 자신 있는 일이라도 덤벙대지 말고 꼼꼼히 확인하라는 뜻이에요." },
            { name: "아니 땐 굴뚝에 연기 날까", origin: "아궁이에 나무를 넣고 불(때다)을 피우지도 않았는데 지붕 위 굴뚝에서 뭉게뭉게 연기가 날 리가 없죠? 불을 피웠으니 연기가 나는 것처럼, 사람들 사이에 어떤 이상한 소문이 돌고 있다면 분명히 그런 소문이 날 만한 이유나 원인이 숨어있다는 뜻이에요." },
            { name: "앓던 이가 빠진 것 같다", origin: "매일 밤 치통 때문에 욱신욱신 쑤셔서 밥도 못 먹고 고생하던 썩은 이빨이, 치과에 가서 쑥 뽑히고 났을 때 그 시원한 기분! 여러분도 아시죠? 오랫동안 마음을 무겁게 짓누르던 큰 고민이나 걱정거리가 마침내 깨끗하게 해결되어 속이 뻥 뚫릴 때 쓰는 말이에요." },
            { name: "양반은 못 된다", origin: "조선 시대의 벼슬아치인 '양반'은 체통을 지키느라 누가 부르기 전에는 함부로 모습을 드러내지 않았대요. 친구들끼리 안 보이는 친구 흉을 보거나 이야기를 하고 있는데, 기가 막힌 타이밍에 그 친구가 불쑥 나타나면 '어이구, 양반은 못 되네!' 하고 놀리며 쓰던 말이랍니다." },
            { name: "어물전 망신은 꼴뚜기가 시킨다", origin: "어물전은 생선을 파는 가게예요. 멋진 고등어나 도미들 사이에, 아주 작고 못생긴 꼴뚜기 한 마리가 끼어 있으면 생선 가게 전체가 별 볼 일 없어 보인다고 해서 생긴 속담이에요. 못난 사람 한 명 때문에 그 사람이 속한 모둠이나 반 전체의 체면이 깎일 때 써요." },
            { name: "열 번 찍어 안 넘어가는 나무 없다", origin: "아무리 굵고 단단한 거대한 나무라도, 나무꾼이 포기하지 않고 도끼로 한 번, 두 번, 열 번을 쾅쾅 내리찍으면 결국 쿵 하고 쓰러진다는 진리를 담은 말이에요. 아무리 어렵고 실패를 거듭하더라도 포기하지 않고 끊임없이 노력하면 결국 성공할 수 있답니다." },
            { name: "오르지 못할 나무는 쳐다보지도 마라", origin: "너무 높고 가지가 없는 매끈한 나무는 아무리 애써도 중간에 미끄러져 다치기만 하죠. 애초에 내 능력으로 도저히 불가능한 일이라면 무리하게 욕심내어 상처받지 말고 일찍 포기하라는 옛 어른들의 현실적인 조언이에요." },
            { name: "옥의 티", origin: "'옥'은 옛날 왕이나 귀족들이 아주 소중하게 여겼던 반짝이는 푸른색 보석이에요. 그런데 그 완벽하고 아름다운 보석 안에 아주 작고 까만 점(티)이 하나 박혀 있다면 어떨까요? 전체적으로는 너무 훌륭하지만 딱 하나 아쉬운 아주 사소한 결점을 뜻해요." },
            { name: "우물 안 개구리", origin: "깊은 우물 바닥에 사는 개구리가 있었어요. 개구리는 동그란 우물 입구로 보이는 하늘이 세상의 전부인 줄 알고 '내가 이 세상에서 제일 똑똑해!'라고 뽐냈죠. 더 넓은 바다와 세상이 있는 줄도 모르고요. 자기 주변의 좁은 지식만 알고 잘난 척하는 사람을 놀리는 우화예요." },
            { name: "울며 겨자 먹기", origin: "겨자를 듬뿍 찍은 음식을 먹으면 코가 찡하고 매워서 저절로 눈물이 핑 돌죠? 너무너무 맵고 싫어서 먹기 싫은데, 누군가 억지로 입에 넣어서 눈물을 줄줄 흘리며 어쩔 수 없이 삼키는 모습이에요. 자기가 하기 싫은 귀찮은 일을 남의 강요 때문에 억지로 할 때 써요." },
            { name: "원수는 외나무다리에서 만난다", origin: "너무너무 싫어해서 꼴도 보기 싫은 원수를 피하고 다녔는데, 하필이면 양보할 수도 없고 도망칠 곳도 없는 좁디좁은 외나무다리 한가운데서 딱 마주쳐버린 기막힌 상황이에요. 피하고 싶은 사람이나 상황을 절대 피할 수 없는 곳에서 운명처럼 만나게 될 때 쓰는 말이에요." },
            { name: "원숭이도 나무에서 떨어진다", origin: "원숭이는 나무 타기의 세계 챔피언이죠? 눈을 감고도 이리저리 휙휙 날아다니는 원숭이도 가끔은 실수해서 땅으로 쿵 하고 떨어질 때가 있대요. 아무리 그 분야의 대단한 전문가나 달인이라도 어쩌다 한 번쯤은 평범한 실수를 할 수 있다는 뜻으로, 실수한 친구를 위로할 때도 써요." },
            { name: "윗물이 맑아야 아랫물이 맑다", origin: "산꼭대기 옹달샘에서 흘러내려 오는 물(윗물)이 깨끗해야, 그 물이 흘러간 마을 아래쪽 시냇물(아랫물)도 맑고 깨끗하겠죠? 형이나 언니, 선생님 같은 윗사람이 먼저 모범을 보이고 바르게 행동해야 동생들이나 아랫사람도 그걸 보고 바르게 자란다는 교훈이에요." },
            { name: "이 없으면 잇몸으로 산다", origin: "밥을 씹어 먹을 때 쓰는 이빨이 다 빠져서 없더라도, 사람은 어떻게든 잇몸으로 오물오물 씹어서 살아가게 된다는 생명력 강한 유래예요. 내게 꼭 필요한 물건이나 사람이 없더라도, 포기하지 않고 다른 비슷한 방식을 찾아내어 꿋꿋하게 버텨낼 수 있다는 긍정적인 뜻이랍니다." },
            { name: "자다가 봉창 두드린다", origin: "옛날 한밤중에 깊이 잠들어 있던 사람이 갑자기 벌떡 일어나 잠꼬대로 문(봉창)을 쾅쾅 두드려 식구들을 깜짝 놀라게 한 재미있는 상황에서 왔어요. 사람들이 진지하게 대화하고 있는데, 혼자 전혀 상관없는 엉뚱하고 이상한 소리를 불쑥 꺼낼 때 핀잔을 주며 쓰는 말이에요." },
            { name: "작은 고추가 맵다", origin: "크고 뚱뚱한 오이고추는 하나도 안 맵지만, 손가락보다 작고 얇은 청양고추는 한 입만 베어 물어도 입안에서 불이 날 정도로 맵죠? 겉보기에는 키도 작고 체구도 작아 보이지만, 실제로는 재주가 아주 뛰어나고 속이 꽉 찬 야무진 사람을 칭찬할 때 쓰는 훌륭한 속담이에요." },
            { name: "재주는 곰이 부리고 돈은 주인이 받는다", origin: "옛날 장터에서 커다란 곰이 땀을 뻘뻘 흘리며 빙글빙글 구르고 재주를 부렸는데, 구경꾼들이 던져주는 돈은 뒤에서 채찍을 들고 있던 얌체 같은 주인이 다 주머니에 챙겨갔다는 억울한 이야기예요. 고생은 내가 다 했는데, 그 칭찬이나 이익은 엉뚱한 사람이 가로챘을 때 써요." },
            { name: "종로에서 뺨 맞고 한강에서 화풀이한다", origin: "옛날 가장 번화했던 거리인 '종로'에서 어떤 힘센 사람에게 억울하게 뺨을 맞은 사람이, 거기선 무서워서 아무 말도 못 하고 꾹 참다가 아무도 없는 '한강'에 가서 괜히 돌멩이를 던지며 소리를 질렀다는 유래예요. 화난 원인과는 전혀 상관없는 엉뚱한 사람에게 짜증을 낼 때 쓰는 말이에요." },
            { name: "지렁이도 밟으면 꿈틀한다", origin: "길을 가다 조그만 지렁이를 밟으면 꼼짝도 못 할 것 같지만, 지렁이도 아파서 온몸을 꼬며 꿈틀꿈틀 반항을 한답니다. 평소에 화를 한 번도 안 내는 아주 순하고 착한 사람이라도, 너무 무시하고 계속 괴롭히면 결국 크게 화를 내며 가만히 있지 않는다는 경고의 메시지예요." },
            { name: "천리길도 한 걸음부터", origin: "'천 리'는 무려 400km가 넘는 아주 멀고 아득한 거리예요. 하지만 아무리 먼 길이라도 결국 첫 번째 '한 걸음'을 내디뎌야 시작할 수 있죠. 아무리 어렵고 방대한 일이라도 차근차근 시작하는 첫 단추가 가장 중요하다는 뜻으로 새로운 도전을 하는 사람에게 용기를 주는 말이에요." },
            { name: "첫술에 배부르랴", origin: "맛있는 밥을 지어서 숟가락으로 딱 한 입(첫술) 먹었는데 갑자기 배가 터질 듯이 부를 수 있을까요? 절대 아니죠. 무슨 일이든 처음 딱 한 번 해보고 바로 완벽한 성공을 거둘 수는 없으니, 조급해하지 말고 꾸준히 노력하라는 뜻이랍니다." },
            { name: "칼로 물 베기", origin: "날카로운 칼로 흐르는 시냇물을 힘껏 내리쳐서 반으로 잘라보세요. 잘리나요? 순식간에 물이 다시 합쳐져 버리죠. 부부나 형제처럼 아주 친한 사이에는 아무리 크게 다투고 싸워도, 금방 스르르 풀리고 언제 그랬냐는 듯 화해하게 된다는 따뜻한 비유랍니다." },
            { name: "콩심은데 콩 나고 팥 심은 데 팥 난다", origin: "농부가 밭에 콩 씨앗을 심으면 가을에 무조건 콩이 열리고, 팥 씨앗을 심으면 팥이 열리는 아주 당연한 자연의 법칙이에요. 내가 착한 일을 하면 좋은 결과가 돌아오고, 나쁜 짓을 하면 결국 벌을 받는다는 '인과응보'를 알기 쉽게 농사에 빗대어 만든 말이에요." },
            { name: "티끌 모아 태산", origin: "눈에 잘 보이지도 않는 아주 작은 먼지(티끌)라도, 오랜 시간 동안 계속해서 모이고 모이면 언젠가는 저 높고 거대한 산(태산)이 될 수 있다는 놀라운 뜻이에요. 매일매일 100원씩 저금하거나 하루에 단어 5개씩 꾸준히 외우면 나중에 엄청난 결과가 된다는 걸 가르쳐줘요." },
            { name: "하늘이 무너져도 솟아날 구멍이 있다", origin: "우리가 사는 푸른 하늘이 와르르 무너져 내리는 건 상상만 해도 끔찍한 재앙이죠. 하지만 옛 어른들은 그런 멸망의 순간에도 어딘가에 살아서 빠져나갈 작은 구멍이 반드시 있다고 믿었어요. 아무리 절망적이고 힘든 상황이라도 절대 포기하지 않으면 해결책이 있다는 희망의 속담이에요." },
            { name: "하룻강아지 범 무서운 줄 모른다", origin: "태어난 지 하루밖에 안 된 아주 조그맣고 눈도 못 뜬 강아지가 눈앞에 어슬렁거리는 산중 호랑이(범)를 보고도 꼬리를 치며 멍멍 짖고 덤비는 엉뚱한 모습이에요. 세상 물정도 모르고 자신의 능력을 과대평가하여 너무 강한 상대에게 겁 없이 함부로 덤비는 사람을 놀릴 때 쓴답니다." },
            { name: "한 귀로 듣고 한 귀로 흘린다", origin: "선생님이나 부모님이 중요한 말씀을 하시는데, 그 말이 오른쪽 귀로 쏙 들어갔다가 뇌에 저장되지 않고 바로 왼쪽 귀로 스르륵 빠져나가 버리는 모습을 상상해 보세요. 남의 진심 어린 충고나 지시를 귀담아듣지 않고 대충 무시해 버리는 나쁜 태도를 지적할 때 쓰는 말이에요." },
            { name: "낮말은 새가 듣고 밤말은 쥐가 듣는다", origin: "낮에는 숲속의 짹짹거리는 새가 우리 이야기를 엿듣고, 밤에는 지붕 위의 찍찍거리는 쥐가 엿듣고 있다는 재미있는 이야기예요. '아무도 없으니 우리끼리 흉보자!' 하고 방심해도 결국 누군가는 다 듣고 소문이 나게 되어 있으니 항상 입조심을 하라는 비밀스러운 교훈이랍니다." },
            { name: "말이 씨가 된다", origin: "우리가 내뱉은 '말'이 땅에 떨어져 싹을 틔우는 '씨앗'이 된다고 생각해 보세요. 자꾸 '망했어, 안 될 거야'라고 나쁜 말을 하면 정말로 나쁜 열매가 열리고, '할 수 있어!'라고 좋은 말을 하면 성공의 열매가 열린대요. 그래서 항상 긍정적이고 좋은 말만 하라는 조상님들의 지혜예요." },
            { name: "호랑이도 제 말 하면 온다", origin: "친구들끼리 모여서 '호랑이는 정말 무섭게 생겼어!' 하고 뒷담화를 하고 있는데, 등 뒤에서 진짜 호랑이가 '어흥!' 하고 나타난 오싹한 상황이에요. 누군가에 대해 이야기를 하고 있는데 마침 그 사람이 기막힌 타이밍에 딱 나타났을 때 쓰는 말로, '양반은 못 된다'와 똑같은 뜻이에요." },
            { name: "호랑이 굴에 들어가야 호랑이를 잡는다", origin: "크고 멋진 호랑이를 사냥하려면 집 안에서 구경만 해서는 안 되겠죠? 무섭고 덜덜 떨리더라도 용기를 내어 호랑이가 사는 컴컴한 굴속으로 직접 뛰어들어야만 잡을 수 있어요. 큰 성공이나 목표를 이루려면 반드시 그만큼의 위험이나 어려움을 용감하게 이겨내야 한다는 뜻이에요." },
            { name: "혹 떼러 갔다가 혹 붙여 온다", origin: "턱에 무거운 혹이 달린 영감이 도깨비들에게 속아 혹을 떼러 갔다가, 오히려 도깨비들을 화나게 해서 반대쪽 턱에 혹을 하나 더 붙이고 돌아왔다는 유명한 전래동화에서 유래했어요. 자기에게 이익을 보려다가 욕심 때문에 오히려 더 큰 손해를 보고 낭패를 당했을 때 쓰는 재미있는 비유랍니다." },
            { name: "엎친 데 덮치다", origin: "빙판길에서 꽈당 하고 앞으로 넘어져서 코가 깨졌는데(엎치다), 뒤따라오던 친구가 내 위로 무겁게 쿵 하고 쓰러져서(덮치다) 허리까지 다쳐버린 끔찍한 상황이에요. 안 그래도 슬프고 나쁜 일이 일어났는데, 거기에 또 다른 불행이 겹쳐서 일어날 때 눈물을 훔치며 쓰는 말이에요." },
            { name: "개천에서 용 난다", origin: "'개천'은 동네에 있는 작고 냄새나는 얕은 냇물이에요. 이런 곳에서는 미꾸라지만 살 수 있는데, 기적처럼 웅장하고 거대한 '용'이 번쩍이며 태어난 거예요! 아주 가난하고 어려운 환경을 뚫고 피나는 노력을 해서 훌륭한 성공을 거둔 대단한 사람을 칭찬할 때 감탄하며 쓰는 말이에요." },
            { name: "웃는 낯에 침 못 뱉는다", origin: "아무리 화가 잔뜩 나서 상대를 혼내주려고 찾아갔는데, 상대방이 활짝 웃으며 상냥하고 친절하게 인사하면 차마 그 얼굴(낯)에 침을 뱉거나 욕을 할 수 없게 되죠? 항상 부드럽고 친절한 태도로 다가가면 상대방의 화도 눈 녹듯 사라지게 만들 수 있다는 평화로운 속담이랍니다." },
            { name: "도랑 치고 가재 잡는다", origin: "마을의 막힌 물길(도랑)을 청소하다가, 바위 밑에 숨어있던 맛있는 가재까지 덤으로 잡아서 저녁 반찬으로 먹었다는 농촌의 일상에서 왔어요. 청소도 하고 반찬도 얻었죠! 어떤 한 가지 착한 일이나 행동을 했는데, 생각지도 못한 두 가지 이익을 한꺼번에 얻어 기분이 아주 좋을 때 써요." },
            { name: "마파람에 게 눈 감추듯", origin: "'마파람'은 남쪽에서 불어오는 따뜻한 바람이에요. 갯벌에 나와 놀던 게들이 이 바람이 불면 깜짝 놀라 두 눈을 껍질 속으로 순식간에 쏙 감춰버린대요. 배가 너무너무 고픈 사람이 맛있는 음식을 번개처럼 눈 깜짝할 사이에 후루룩 다 먹어 치워버리는 모습을 재미있게 표현한 말이에요." },
            { name: "꿩 먹고 알 먹기", origin: "산에서 꿩을 사냥하러 갔는데 덤으로 둥지에 있던 영양 만점 꿩알까지 주워왔다는 뜻이에요. 앞서 나온 '도랑 치고 가재 잡는다'와 완전히 똑같은 뜻으로, 한 가지 일로 두 가지 큰 이득을 보았을 때 손뼉을 치며 좋아하는 상황이랍니다." },
            { name: "등 따습고 배부르다", origin: "추운 겨울날 뜨끈뜨끈한 온돌방 아랫목에 누워 등은 따뜻하게 지지고, 방금 먹은 고구마 때문에 배는 빵빵하게 부른 세상 부러울 것 없는 행복한 상태예요. 아무 걱정거리도, 불만도 없이 평화롭고 안락하게 살아가는 사람의 모습을 그린 가장 원초적인 행복의 표현이랍니다." },

        function searchProverb() {
            // 사용자가 입력한 검색어의 띄어쓰기를 없애서 검색이 쉽게 되도록 처리
            const keyword = document.getElementById("searchInput").value.trim().replace(/\s+/g, "");
            const resultArea = document.getElementById("result-area");
            const resultTitle = document.getElementById("resultTitle");
            const resultContent = document.getElementById("resultContent");
            const errorContent = document.getElementById("errorContent");
            const resultOrigin = document.getElementById("resultOrigin");
            const errorMsg = document.getElementById("errorMsg");

            if (keyword === "") {
                alert("궁금한 속담을 입력해주세요!");
                return;
            }

            // DB에 있는 속담 이름도 띄어쓰기를 없애서 유연하게 검색되게 함
            const foundProverb = proverbDB.find(p => p.name.replace(/\s+/g, "").includes(keyword));

            resultArea.style.display = "block"; 

            if (foundProverb) {
                resultContent.style.display = "block";
                errorContent.style.display = "none";
                
                resultTitle.innerHTML = `"${foundProverb.name}"`;
                resultOrigin.innerHTML = foundProverb.origin;
            } else {
                resultContent.style.display = "none";
                errorContent.style.display = "block";
                
                resultTitle.innerHTML = "앗, 아직 못 찾았어요!";
                errorMsg.innerHTML = "학습지에 있는 100개의 속담이 맞는지 오타를 다시 한번 확인해 보세요!";
            }
        }

        // 엔터키를 쳐도 검색되게 하는 마법의 코드
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                searchProverb();
            }
        }
    </script>
